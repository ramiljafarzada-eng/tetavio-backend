<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bd4ff"/>
      <stop offset="100%" stop-color="#0037ff"/>
    </linearGradient>
  </defs>
  <!-- small square bottom-left -->
