databases:
  - name: tetavio-postgres
    plan: basic-1gb

services:
  - name: tetavio-backend
    type: web
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tetavio-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: THROTTLE_TTL_MS
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: PAYMENT_GATEWAY
        value: MOCK
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_PRODUCTION_URL
        sync: false
      - key: PASHA_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  - name: tetavio-frontend
    type: web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: tetavio-backend
          type: web
          property: host
